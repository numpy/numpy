name: "Pull Request Labeler"
on:
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  pr-labeler:
    if: github.repository == 'numpy/numpy'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # to add labels
    steps:
    - name: Label the PR
      continue-on-error: true
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
      with:
        script: |
          const {data} = await github.rest.repos.getContent({
            owner: context.repo.owner,
            repo: context.repo.repo,
            path: '.github/pr-prefix-labeler.yml',
          });
          // parse the config's `"PREFIX": "label"` lines directly
          const content = Buffer.from(data.content, data.encoding).toString();
          const prefixToLabel = {};
          for (const line of content.split('\n')) {
            const match = line.match(/^\s*"([^"]+)"\s*:\s*"([^"]+)"\s*$/);
            if (match) {
              prefixToLabel[match[1]] = match[2];
            }
          }
          if (Object.keys(prefixToLabel).length === 0) {
            throw new Error('No entries parsed from pr-prefix-labeler.yml');
          }
          const title = context.payload.pull_request.title;
          for (const [prefix, label] of Object.entries(prefixToLabel)) {
            if (title.startsWith(prefix)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [label],
              });
              break;
            }
          }
